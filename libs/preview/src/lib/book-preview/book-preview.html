<article class="book-page" [attr.lang]="document.language">
  @if (bookTitle()) {
  <header class="book-page__header">
    <h1 class="book-page__title">{{ bookTitle() }}</h1>
    @if (bookSubtitle()) {
    <p class="book-page__subtitle">{{ bookSubtitle() }}</p>
    }
  </header>
  } @for (child of children(); track child.id) {
  <kdp-ast-node [node]="child" />
  }
</article>
