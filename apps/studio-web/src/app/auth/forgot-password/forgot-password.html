<div class="auth">
  <a class="auth__brand" routerLink="/">KDP MasterPeace</a>
  <div class="auth__card">
    <h1 class="auth__title">Passwort zurücksetzen</h1>
    <p class="auth__lead">Wir senden dir einen Link zum Zurücksetzen.</p>

    @if (error()) {
    <p class="auth__error" role="alert">{{ error() }}</p>
    } @if (sent()) {
    <p class="auth__ok" role="status">
      Wenn ein Konto existiert, ist die E-Mail unterwegs. Prüfe dein Postfach.
    </p>
    }

    <form (ngSubmit)="submit()">
      <div class="auth__field">
        <label class="auth__label" for="fp-email">E-Mail</label>
        <input
          id="fp-email"
          class="auth__input"
          name="email"
          type="email"
          autocomplete="email"
          required
          [(ngModel)]="email"
        />
      </div>
      <button class="auth__submit" type="submit" [disabled]="busy()">
        {{ busy() ? 'Wird gesendet …' : 'Link senden' }}
      </button>
    </form>

    <nav class="auth__alt" aria-label="Weitere Optionen">
      <a routerLink="/login">Zurück zur Anmeldung</a>
    </nav>
  </div>
</div>
