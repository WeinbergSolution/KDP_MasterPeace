<div class="app-shell">
  <aside class="app-rail">
    <div class="app-rail__brand">KDP MasterPeace</div>
    <nav class="app-rail__nav" aria-label="Hauptnavigation">
      @for (item of navItems; track item.label) {
      <button
        type="button"
        class="app-rail__link"
        [class.app-rail__link--active]="item.active"
        [attr.aria-current]="item.active ? 'page' : null"
      >
        {{ item.label }}
      </button>
      }
    </nav>
  </aside>

  <main class="app-main">
    <div class="app-main__content">
      <app-markup-workspace />
    </div>
  </main>
</div>
